services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_ORIGIN: "${VITE_API_ORIGIN:-http://3.108.76.125:5000}"
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ASPNETCORE_URLS: "http://+:5000"
      AllowedHosts: "${ALLOWED_HOSTS:-*}"
      App__UseHttpsRedirection: "${APP_USE_HTTPS_REDIRECTION:-false}"
      Branding__LogoUrl: "${PUBLIC_LOGO_URL:-http://3.108.76.125:5000/images/pirnav-logo.png}"
      ConnectionStrings__DefaultConnection: "${BACKEND_CONNECTION_STRING}"
      Cors__AllowedOrigins: "${CORS_ALLOWED_ORIGINS:-http://3.108.76.125:5173}"
      EmailSettings__ContactEmail: "${EMAIL_CONTACT:-contact@example.com}"
      EmailSettings__HrEmail: "${EMAIL_HR:-hr@example.com}"
      EmailSettings__Password: "${EMAIL_PASSWORD:-change-me}"
      EmailSettings__Port: "${SMTP_PORT:-465}"
      EmailSettings__SenderEmail: "${EMAIL_SENDER_EMAIL:-no-reply@example.com}"
      EmailSettings__SenderName: "${EMAIL_SENDER_NAME:-Pirnav Careers}"
      EmailSettings__SmtpServer: "${SMTP_SERVER:-smtp.example.com}"
      Ems__BaseUrl: "${EMS_BASE_URL:-https://ems.example.com/}"
      JwtSettings__Audience: "${JWT_AUDIENCE:-PirnavClient}"
      JwtSettings__DurationInMinutes: "${JWT_DURATION_MINUTES:-60}"
      JwtSettings__Issuer: "${JWT_ISSUER:-PirnavAPI}"
      JwtSettings__Key: "${JWT_KEY:-replace-with-at-least-32-characters}"
      PublicBaseUrl: "${PUBLIC_BASE_URL:-http://3.108.76.125:5000}"
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - backend_resumes:/app/wwwroot/resumes
      - backend_uploads:/app/wwwroot/uploads
    restart: unless-stopped

volumes:
  backend_resumes:
  backend_uploads:
